version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mineru-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mineru
      POSTGRES_PASSWORD: mineru123
      POSTGRES_DB: mineru_pipeline
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mineru -d mineru_pipeline"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4.8
    container_name: mineru-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: cgr.dev/chainguard/minio:latest
    container_name: mineru-minio
    restart: unless-stopped
    entrypoint: ["minio"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
