version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mineru-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mineru
      POSTGRES_PASSWORD: mineru123
      POSTGRES_DB: mineru_pipeline
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mineru -d mineru_pipeline"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4.8
    container_name: mineru-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: cgr.dev/chainguard/minio:latest
    container_name: mineru-minio
    restart: unless-stopped
    entrypoint: ["minio"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  elasticsearch:
    image: elasticsearch:8.19.15
    container_name: mineru-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
      - ./data/plugins/elasticsearch-analysis-ik-8.19.15.zip:/ik.zip:ro
    command: >
      bash -c "
        elasticsearch-plugin list | grep -q analysis-ik ||
          elasticsearch-plugin install --batch file:///ik.zip;
        /usr/local/bin/docker-entrypoint.sh elasticsearch
      "
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200/_cluster/health?local=true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  kibana:
    image: kibana:8.19.15
    container_name: mineru-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: mineru-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: ["etcd", "-advertise-client-urls=http://127.0.0.1:2379", "-listen-client-urls", "http://0.0.0.0:2379", "--data-dir", "/etcd"]
    volumes:
      - ./data/etcd:/etcd

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: mineru-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - ./data/milvus:/var/lib/milvus
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY_ID=minioadmin
      - MINIO_SECRET_ACCESS_KEY=minioadmin123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      - etcd
      - minio

  attu:
    image: zilliz/attu:v2.4.12
    container_name: mineru-attu
    restart: unless-stopped
    ports:
      - "8000:3000"
    environment:
      - MILVUS_URL=milvus:19530
    depends_on:
      - milvus
